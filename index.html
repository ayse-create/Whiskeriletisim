<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ProfCat Chat</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    #chat { height: 90vh; overflow-y: auto; padding: 10px; }
    .msg { padding: 8px 12px; margin: 6px; border-radius: 10px; max-width: 70%; }
    .user { background: #d1e7ff; align-self: flex-end; margin-left: auto; }
    .admin { background: #d4ffd6; }
    #inputBox { display: flex; }
    input { flex: 1; padding: 10px; }
    button { padding: 10px; }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Mesaj yaz...">
  <button onclick="send()">Gönder</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxcdP7zEPcJJ5jlby8kHfBWj6VuKq9Xfk3J6mmzCJta/dev";
const chatId = localStorage.getItem("chatId") || Date.now().toString();
localStorage.setItem("chatId", chatId);

async function send() {
  const message = document.getElementById("msg").value;

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "send",
      chatId,
      sender: "user",
      message
    })
  });

  document.getElementById("msg").value = "";
  load();
}

async function load() {
  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "get",
      chatId
    })
  });

  const data = await res.json();

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.sender === "user" ? "user" : "admin");
    div.innerText = m.message;
    chat.appendChild(div);
  });
}

setInterval(load, 3000);
load();
</script>

</body>
</html>
